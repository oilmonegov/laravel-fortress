            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-006"
            title: "Use `uuid()` or `ulid()` for public-facing IDs"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-007"
            title: "Unique constraints on natural keys"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-008"
            title: "Composite indexes match query column order"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-009"
            title: "Index columns used in WHERE, ORDER BY, JOIN"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-010"
