            title: "Queue large exports"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-036"
            title: "Stream large downloads"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-037"
            title: "Limit export row counts"
            severity: warning
            enforcement: standard
            applies_when: [always]

      - id: "S054"
        title: "Zero-Downtime Migration Safety"
        rules:
          - id: "F-P09-038"
            title: "Add columns as nullable first, then backfill, then add constraints"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-039"
            title: "Never rename columns in one step"
            severity: critical
            enforcement: strict
            applies_when: [always]
          - id: "F-P09-040"
            title: "Never drop columns that code still references"
            severity: critical
            enforcement: strict
            applies_when: [always]
          - id: "F-P09-041"
            title: "Use `after()` for column ordering"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-042"
            title: "Create indexes concurrently when possible"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-043"
            title: "Drop indexes before dropping columns"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-044"
            title: "Test both `up()` and `down()`"
            severity: warning
            enforcement: standard
            applies_when: [always]
