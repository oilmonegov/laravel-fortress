            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-028"
            title: "`withTrashed()` for soft-deleted parent access"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-029"
            title: "Use `sync()` carefully"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-030"
