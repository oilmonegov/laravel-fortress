            enforcement: strict
            applies_when: [always]
          - id: "F-P01-018"
            title: "`Referrer-Policy: strict-origin-when-cross-origin`"
            severity: critical
            enforcement: strict
            applies_when: [always]
          - id: "F-P01-019"
            title: "`Permissions-Policy: camera=(), microphone=(), geolocation=()`"
