# fortress-rules.yml — Master rule registry for The Laravel Fortress
# https://github.com/oilmonegov/laravel-fortress
#
# This file contains all 1,755 checks as machine-readable rules.
# AI coding assistants consume this to enforce project standards.

version: "1.1.0"
total_rules: 1755

# Stack detection markers — AI agents read these files to detect project stack
stack_detection:
  php: { file: composer.json, path: config.platform.php, fallback: require.php }
  laravel: { file: composer.json, path: require.laravel/framework }
  vue: { file: package.json, path: dependencies.vue }
  react: { file: package.json, path: dependencies.react }
  inertia: { file: composer.json, path: require.inertiajs/inertia-laravel }
  tailwind: { file: package.json, path: devDependencies.tailwindcss }
  database: { file: .env, key: DB_CONNECTION }
  testing_pest: { file: composer.json, path: require-dev.pestphp/pest }
  testing_phpunit: { file: composer.json, path: require-dev.phpunit/phpunit }
  redis: { file: .env, keys: [CACHE_STORE, QUEUE_CONNECTION, SESSION_DRIVER], match: redis }

# Severity: critical | warning | info
# Enforcement: strict | standard | relaxed
# applies_when: always | php >= X.Y | laravel >= X | has: pkg | database: X | frontend: X | has_redis | no_frontend

parts:

  - id: P01
    name: "Application Security"
    file: "parts/01-application-security.md"
    sections:

      - id: "S001"
        title: "Security — OWASP & Laravel-Specific"
        rules:
          - id: "F-P01-001"
