          - id: "F-P09-018"
            title: "Use database-level aggregation"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-019"
            title: "Understand your isolation level"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-020"
            title: "Use `lockForUpdate()` for pessimistic locking"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-021"
            title: "Use `sharedLock()` for read consistency"
            severity: warning
            enforcement: standard
            applies_when: [always]

      - id: "S041"
        title: "Eloquent Relationship & Polymorphic Safety"
        rules:
          - id: "F-P09-022"
            title: "Morph maps for polymorphic relationships"
            severity: warning
