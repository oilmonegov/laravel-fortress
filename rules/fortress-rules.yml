            severity: critical
            enforcement: strict
            applies_when: [always]
          - id: "F-P01-003"
            title: "Never pass untrusted input to `Rule::unique()` ignore parameter"
            severity: critical
            enforcement: strict
            applies_when: [always]
          - id: "F-P01-004"
            title: "Escape LIKE wildcards"
            severity: critical
            enforcement: strict
            applies_when: [always]
          - id: "F-P01-005"
            title: "Use `{{ }}` (escaped) in Blade, never `{!! !!}` with untrusted data"
