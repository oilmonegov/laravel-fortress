            enforcement: standard
            applies_when: [always]
          - id: "F-P09-049"
            title: "Use `->isEmpty()` / `->isNotEmpty()`"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-050"
            title: "Use `->whenNotEmpty()` / `->whenEmpty()`"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-051"
            title: "`->pluck()` returns duplicates"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-052"
            title: "`->map()` vs `->transform()`"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-053"
            title: "`->filter()` without callback removes falsy values"
