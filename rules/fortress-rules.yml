            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-046"
            title: "Run `migrate --pretend` first"
            severity: warning
            enforcement: standard
            applies_when: [always]

      - id: "S055"
        title: "Collection & Array Safety"
        rules:
          - id: "F-P09-047"
