          - id: "F-P09-012"
            title: "Unique constraints with soft deletes"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-013"
            title: "`withTrashed()` in relationships where needed"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-014"
            title: "Use `select()` to limit columns"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-015"
            title: "Use `chunk()` or `cursor()` for large datasets"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-016"
            title: "Use `exists()` not `count() > 0`"
            severity: warning
            enforcement: standard
            applies_when: [always]
          - id: "F-P09-017"
            title: "Use `pluck()` for single-column results"
            severity: warning
            enforcement: standard
