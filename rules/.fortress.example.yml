# .fortress.yml — Project-level Laravel Fortress configuration
# Copy this file to your project root and customize.
#
# The AI coding assistant reads this file to determine which rules
# to enforce and at what level. If this file is absent, all parts
# are enabled at "standard" enforcement.
#
# Documentation: https://github.com/oilmonegov/laravel-fortress/blob/main/rules/README.md

fortress:
  version: "1.0.0"

  # Stack override (auto-detected from composer.json / package.json if omitted)
  # Uncomment and set only if auto-detection gives wrong results.
  # stack:
  #   php: "8.4"
  #   laravel: "12"
  #   database: "mysql"
  #   frontend: "vue3"
  #   testing: "pest"

  # Per-part configuration
  # Each part can be enabled/disabled and have its enforcement level set.
  # Enforcement levels: strict | standard | relaxed
  parts:
    P01_application_security:
      enabled: true
      enforcement: strict          # Security should always be strict

    P02_cryptography:
      enabled: true
      enforcement: strict          # Crypto errors are hard to detect

    P03_authentication:
      enabled: true
      enforcement: strict          # Auth bypass = critical vulnerability

    P04_data_integrity:
      enabled: true
      enforcement: standard

    P05_financial_monetary:
      enabled: true                # Enable for fintech / accounting apps
      enforcement: strict          # Money bugs are silent and catastrophic

    P06_php_language:
      enabled: true
      enforcement: standard

    P07_clean_code:
      enabled: true
      enforcement: standard

    P08_laravel_framework:
      enabled: true
      enforcement: standard

    P09_database:
      enabled: true
      enforcement: standard

    P10_frontend:
      enabled: true                # Set to false for API-only projects
      enforcement: standard

    P11_testing:
      enabled: true
      enforcement: standard

    P12_apis_queues:
      enabled: true
      enforcement: standard

    P13_logging_audit:
      enabled: true
      enforcement: standard

    P14_infrastructure:
      enabled: true
      enforcement: relaxed         # Many checks are environment-specific

  # Per-rule overrides (optional)
  # Override enforcement or disable specific rules.
  # These take precedence over part-level settings.
  # rules:
  #   F-P01-001:
  #     enforcement: strict        # Always strict on SQL injection
  #   F-P08-042:
  #     enabled: false
  #     reason: "Not applicable — we use a custom ORM"

  # Severity threshold
  # Rules below this severity level are ignored entirely.
  # Options: critical | warning | info
  minimum_severity: warning

  # --- Git Hooks ---
  # Fortress provides 10 active hooks + 5 stubs for AI-assisted development safety.
  # Install via: php artisan fortress:hooks install
  git_hooks:
    enabled: true

    pre_commit:
      enabled: true
      run_pint: true              # Run Laravel Pint on staged PHP files
      check_debug: true           # Block dd(), dump(), ray(), var_dump()
      check_env: true             # Block .env files from being committed
      check_secrets: true         # Scan for hardcoded secrets/API keys
      check_strict_types: false   # Check declare(strict_types=1) — advisory
      max_file_size_kb: 500       # Warn on files larger than this

    commit_msg:
      enabled: true
      conventional: true          # Require conventional commit format
      min_length: 10              # Minimum commit message length
      max_length: 72              # Maximum first-line length
      block_wip_on_protected: true # Block WIP/fixup on protected branches

    pre_push:
      enabled: true
      run_tests: true             # Run test suite before push
      run_phpstan: true           # Run PHPStan static analysis
      run_audit: true             # Run composer audit
      block_direct_push: true     # Block direct push to protected branches
      timeout: 300                # Max seconds for tests/analysis

    prepare_commit_msg:
      enabled: true
      add_ai_coauthor: true       # Auto-add Co-Authored-By for AI assistants
      add_branch_prefix: false    # Prepend branch ticket ID to commit message

    post_checkout:
      enabled: true
      auto_composer_install: false # Auto-run composer install on lock change

    post_merge:
      enabled: true
      auto_composer_install: false # Auto-run composer install on lock change

    pre_rebase:
      enabled: true
      block_protected: true       # Block rebase of protected branches

    post_commit:
      enabled: true
      check_strict_types: true    # Advisory: warn on missing strict_types
      check_todos: false          # Advisory: count TODO/FIXME markers

    pre_merge_commit:
      enabled: true               # AI auto-merge blocker (git 2.36+)

    applypatch_msg:
      enabled: true               # Validate patch commit messages

  # --- Merge Protection ---
  # STRONGLY RECOMMENDED: Keep require_human_approval: true
  # This prevents AI agents from auto-merging to production branches.
  merge_protection:
    require_human_approval: true
    require_review_count: 1
    block_ai_auto_merge: true
    protected_branches: [main, master, production]
    allow_ai_to_draft_pr: true    # AI can create draft PRs, humans merge
