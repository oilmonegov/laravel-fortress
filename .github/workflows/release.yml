name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json
        run: |
          php -r "json_decode(file_get_contents('composer.json'), true) ?: exit(1);"
          echo "composer.json is valid JSON"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### Composer (Laravel projects)
            ```bash
            composer require --dev chuxolab/laravel-fortress
            php artisan fortress:install
            ```

            ### Shell (any PHP project)
            ```bash
            curl -sL https://raw.githubusercontent.com/oilmonegov/laravel-fortress/main/install.sh | bash
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
