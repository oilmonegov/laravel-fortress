# .github/workflows/pr-protection.yml
# Laravel Fortress — PR Merge Protection Template
#
# TEMPLATE FILE: This is copied to target projects by `fortress:install --ci`.
# It is NOT active in the fortress repo itself.
#
# Purpose:
#   - Runs fortress compliance checks on every PR to protected branches
#   - Blocks AI auto-merge by requiring human approval
#   - Verifies code quality gates (Pint, PHPStan, tests, audit)
#
# Setup:
#   1. Copy this file to your project's .github/workflows/
#   2. Configure branch protection rules on GitHub to require these checks
#   3. Customize the PHP version and database settings below

name: Fortress PR Protection

on:
  pull_request:
    branches: [main, master, production]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: fortress-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fortress-checks:
    name: Fortress Quality Gates
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run Laravel Pint
        run: vendor/bin/pint --test

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress
        continue-on-error: true

      - name: Run Composer audit
        run: composer audit

      - name: Run tests
        run: php artisan test --compact
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password

  merge-protection:
    name: Merge Protection
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Check for human approval
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const approvals = reviews.filter(r =>
              r.state === 'APPROVED' &&
              r.user.type !== 'Bot'
            );

            const requiredReviews = 1; // Configure: minimum human approvals

            if (approvals.length < requiredReviews) {
              core.setFailed(
                `[Fortress] Merge blocked: ${approvals.length}/${requiredReviews} human approvals. ` +
                `AI-generated PRs require human review before merging.`
              );
              return;
            }

            core.info(`[Fortress] ${approvals.length} human approval(s) — merge allowed.`);

      - name: Check for AI auto-merge attempt
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Check if PR was created by a bot/AI
            const isBot = pr.user.type === 'Bot';
            const aiIndicators = ['[bot]', 'copilot', 'claude', 'dependabot', 'renovate'];
            const authorIsAi = aiIndicators.some(indicator =>
              pr.user.login.toLowerCase().includes(indicator)
            );

            // Check if auto-merge is enabled
            if (pr.auto_merge && (isBot || authorIsAi)) {
              core.setFailed(
                `[Fortress] AI auto-merge to ${pr.base.ref} is BLOCKED. ` +
                `Human approval required. Disable auto-merge and request a human review.`
              );
              return;
            }

            core.info('[Fortress] No AI auto-merge detected — OK.');
